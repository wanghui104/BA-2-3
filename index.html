<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Board</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <div class="history-toolbar" aria-label="历史操作">
        <button type="button" class="history-button" id="undoButton" aria-label="退一步" title="退一步 Ctrl+Z" disabled>↶</button>
        <button type="button" class="history-button" id="redoButton" aria-label="进一步" title="进一步 Ctrl+Y" disabled>↷</button>
        <button type="button" class="save-button" id="saveButton" title="保存 Ctrl+S">保存</button>
        <span class="save-status" id="saveStatus" aria-live="polite">未保存</span>
      </div>

      <div class="board-window-toolbar" aria-label="白板窗口控制">
        <button type="button" id="minimizeBoardsButton" disabled>最小化板子</button>
        <button type="button" id="maximizeBoardsButton" disabled>最大化板子</button>
        <button type="button" id="minimizeBoxesButton" disabled>最小化方框</button>
        <button type="button" id="maximizeBoxesButton" disabled>最大化方框</button>
        <button type="button" id="showMiniOperatorButton" disabled>出现迷你框</button>
        <button type="button" id="hideMiniOperatorButton" disabled>去掉迷你框</button>
      </div>

      <div class="text-format-toolbar top-format-toolbar" id="topFormatToolbar" aria-label="文字格式">
        <div class="format-row format-row-size">
        <button type="button" data-format-action="clear-format" title="清除格式">Tx</button>
        <label class="format-size-control" title="字号">
          <span class="sr-only">字号</span>
          <select data-format-size>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10" selected>10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="14">14</option>
            <option value="16">16</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="24">24</option>
          </select>
        </label>
        <button type="button" data-format-action="increase-size" title="放大字号">A^</button>
        <button type="button" data-format-action="decrease-size" title="缩小字号">A˅</button>
        </div>

        <div class="format-row format-row-inline">
        <button type="button" data-format-action="bold" title="加粗 Ctrl+B"><b>B</b></button>
        <button type="button" data-format-action="italic" title="斜体 Ctrl+I"><i>I</i></button>
        <button type="button" data-format-action="underline" title="下划线 Ctrl+U"><u>U</u></button>
        <span class="format-divider"></span>
        <label class="format-color-control" title="字体颜色">
          <span>A</span>
          <input type="color" data-format-color value="#1c2430" aria-label="字体颜色">
        </label>
        <span class="format-divider legacy-format-divider"></span>
        <button type="button" data-format-action="superscript" title="Superscript Ctrl+.">x2</button>
        <button type="button" data-format-action="subscript" title="Subscript Ctrl+,">x_</button>
        </div>

        <div class="format-row format-row-block">
        <button type="button" data-format-action="paragraph" title="Paragraph">P</button>
        <div class="format-menu">
          <button type="button" data-format-action="bullet" title="Bullet">•</button>
          <button type="button" class="format-menu-toggle" title="Bullet styles">▾</button>
          <div class="format-popover" aria-label="Bullet styles">
            <button type="button" data-format-action="bullet" data-list-style="disc" title="Filled circle">•</button>
            <button type="button" data-format-action="bullet" data-list-style="circle" title="Hollow circle">○</button>
            <button type="button" data-format-action="bullet" data-list-style="diamond" title="Diamond">◆</button>
          </div>
        </div>
        <div class="format-menu">
          <button type="button" data-format-action="numbered" title="Numbered">1.</button>
          <button type="button" class="format-menu-toggle" title="Number styles">▾</button>
          <div class="format-popover" aria-label="Number styles">
            <button type="button" data-format-action="numbered" data-list-style="decimal" title="Decimal">1.</button>
            <button type="button" data-format-action="numbered" data-list-style="lower-alpha" title="Lower alpha">a.</button>
            <button type="button" data-format-action="numbered" data-list-style="lower-roman" title="Lower roman">i.</button>
          </div>
        </div>
        <span class="format-divider"></span>
        <button type="button" data-format-action="outdent" title="Outdent">&lt;</button>
        <button type="button" data-format-action="indent" title="Indent">&gt;</button>
        </div>
      </div>

      <section class="page page-preview is-active" id="previewPage" aria-label="结构预览">
        <section class="workspace" aria-label="interactive knowledge cuboid">
          <section class="model-area">
            <div class="scene-card" aria-label="transparent 3D cuboid">
              <div class="scene" id="scene">
                <div class="model-stage" id="modelStage">
                  <div class="cuboid" id="cuboid"></div>
                  <div class="slice-controls" id="sliceControls" aria-label="切片尺寸"></div>
                  <div class="axis-rig" aria-label="3D coordinate axis">
                    <span class="axis axis-x"><b>X</b></span>
                    <span class="axis axis-y"><b>Y</b></span>
                    <span class="axis axis-z"><b>Z</b></span>
                    <span class="axis-origin"></span>
                  </div>
                </div>
              </div>
              <div class="preview-filters" aria-label="预览筛选">
                <div class="preview-dimensions" aria-labelledby="previewStructureTitle">
                  <div class="preview-dimensions-heading">
                    <h2 id="previewStructureTitle">结构配置</h2>
                  </div>
                  <div class="dimension-grid dimension-grid-preview">
                    <label>
                      <div class="dimension-title-row">
                        <span>宽</span>
                        <input id="widthInput" class="dimension-inline-input" type="text" inputmode="numeric" pattern="[0-9]*" value="3">
                      </div>
                      <div class="dimension-side-row">
                        <div class="side-slice-control" aria-label="从左侧调整宽度">
                          <span>左</span>
                          <div class="side-slice-buttons">
                            <button type="button" id="addWidthLeftButton" aria-label="在宽度最左边增加一列">▲</button>
                            <button type="button" id="removeWidthLeftButton" aria-label="从宽度最左边减少一列">▼</button>
                          </div>
                        </div>
                        <div class="side-slice-control" aria-label="从右侧调整宽度">
                          <span>右</span>
                          <div class="side-slice-buttons">
                            <button type="button" id="addWidthRightButton" aria-label="在宽度最右边增加一列">▲</button>
                            <button type="button" id="removeWidthRightButton" aria-label="从宽度最右边减少一列">▼</button>
                          </div>
                        </div>
                      </div>
                    </label>
                    <label>
                      <div class="dimension-title-row">
                        <span>高</span>
                        <input id="heightInput" class="dimension-inline-input" type="text" inputmode="numeric" pattern="[0-9]*" value="2">
                      </div>
                      <div class="dimension-side-row">
                        <div class="side-slice-control" aria-label="从上侧调整高度">
                          <span>上</span>
                          <div class="side-slice-buttons">
                            <button type="button" id="addHeightTopButton" aria-label="在高度最上边增加一层">▲</button>
                            <button type="button" id="removeHeightTopButton" aria-label="从高度最上边减少一层">▼</button>
                          </div>
                        </div>
                        <div class="side-slice-control" aria-label="从下侧调整高度">
                          <span>下</span>
                          <div class="side-slice-buttons">
                            <button type="button" id="addHeightBottomButton" aria-label="在高度最下边增加一层">▲</button>
                            <button type="button" id="removeHeightBottomButton" aria-label="从高度最下边减少一层">▼</button>
                          </div>
                        </div>
                      </div>
                    </label>
                    <label>
                      <div class="dimension-title-row">
                        <span>深</span>
                        <input id="depthInput" class="dimension-inline-input" type="text" inputmode="numeric" pattern="[0-9]*" value="2">
                      </div>
                      <div class="dimension-side-row">
                        <div class="side-slice-control" aria-label="从前侧调整深度">
                          <span>前</span>
                          <div class="side-slice-buttons">
                            <button type="button" id="addDepthFrontButton" aria-label="在深度最前边增加一层">▲</button>
                            <button type="button" id="removeDepthFrontButton" aria-label="从深度最前边减少一层">▼</button>
                          </div>
                        </div>
                        <div class="side-slice-control" aria-label="从后侧调整深度">
                          <span>后</span>
                          <div class="side-slice-buttons">
                            <button type="button" id="addDepthBackButton" aria-label="在深度最后边增加一层">▲</button>
                            <button type="button" id="removeDepthBackButton" aria-label="从深度最后边减少一层">▼</button>
                          </div>
                        </div>
                      </div>
                    </label>
                  </div>
                </div>
                <label class="rule-menu" aria-label="行数规则">
                  <select id="rowRuleSelect">
                    <option value="global-max" selected>所有板子的行数都为 n 行，其中 n 为所有板子里文字行数最多的那个板子</option>
                    <option value="local">每个板子的行数只服务于该板子</option>
                  </select>
                </label>
                <div class="operator-size-controls" aria-label="迷你方框尺寸">
                  <span>迷你方框</span>
                  <label>
                    <span>长</span>
                    <input id="operatorWidthInput" type="text" inputmode="numeric" pattern="[0-9]*" value="15">
                  </label>
                  <label>
                    <span>宽</span>
                    <input id="operatorHeightInput" type="text" inputmode="numeric" pattern="[0-9]*" value="15">
                  </label>
                  <label>
                    <span>高</span>
                    <input id="operatorDepthInput" type="text" inputmode="numeric" pattern="[0-9]*" value="15">
                  </label>
                </div>
                <label class="rule-menu" aria-label="放大白板预览">
                  <select id="detailPreviewSelect">
                    <option value="off" selected>放大白板预览：关</option>
                    <option value="on">放大白板预览：开</option>
                  </select>
                </label>
                <label class="rule-menu" aria-label="辅助标记">
                  <select id="markerVisibilitySelect">
                    <option value="off" selected>辅助标记：关</option>
                    <option value="on">辅助标记：开</option>
                  </select>
                </label>
              </div>
              <div class="control-bar" aria-label="model controls">
                <button type="button" id="resetView">重置视角</button>
                <label class="spacing-control">
                  <span>间距</span>
                  <input id="spacingInput" type="range" min="8" max="232" step="1" value="8">
                  <output id="spacingReadout" for="spacingInput">8 px</output>
                </label>
                <span id="viewReadout">X -18 deg · Y -34 deg · 100%</span>
              </div>
              <p class="sr-status" id="selectionText" aria-live="polite">尚未选择。</p>
            </div>
          </section>
        </section>
      </section>

    </main>

    <script src="./app.js"></script>
  </body>
</html>
